name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: true
      - run: mise trust
      - run: mise install
      - run: mise run test
      - run: actionlint
      - run: readme build --check
