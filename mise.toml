[settings]
experimental = true
quiet = true
task_output = "interleave"

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
bats = "1.13.0"
actionlint = "1.7.12"
shellcheck = "0.11.0"
gum = "0.17.0"
"shiv:readme" = "latest"
"shiv:codebase" = "latest"

[_.codebase]
lint = ["mise-settings", "shellcheck", "bats-test-task", "bats-test-helper", "mcr-scope", "or-true"]
